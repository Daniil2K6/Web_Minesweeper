<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>САПЁР</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lightning" id="lightning"></div>
    
    <div class="game-container">
        <div class="top-bar">
            <div class="role-badge guest" id="roleBadge">👤 ГОСТЬ</div>
        </div>

        <div class="main-layout">
            <div class="saper-section">
                <div class="top-panel">
                    <div class="mine-counter" id="mineCounter">010</div>
                    <button class="reset-button" id="resetGameBtn">😊</button>
                    <div class="game-timer" id="gameTimer">0.000с</div>
                </div>

                <div class="board-container">
                    <div class="minesweeper-board" id="board"></div>
                </div>

                <div class="status-message" id="gameStatus">⚡ ДОБРО ПОЖАЛОВАТЬ ⚡</div>
            </div>

            <div class="right-section" id="rightSection">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
